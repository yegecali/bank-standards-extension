<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#1565C0"/>

  <!-- Building (company icon) -->
  <rect x="28" y="38" width="44" height="32" rx="2" fill="white" opacity="0.95"/>
  <rect x="28" y="33" width="44" height="7" rx="1" fill="white"/>
  <!-- Building windows -->
  <rect x="33" y="44" width="7" height="6" rx="1" fill="#1565C0" opacity="0.6"/>
  <rect x="43" y="44" width="7" height="6" rx="1" fill="#1565C0" opacity="0.6"/>
  <rect x="53" y="44" width="7" height="6" rx="1" fill="#1565C0" opacity="0.6"/>
  <rect x="33" y="55" width="7" height="6" rx="1" fill="#1565C0" opacity="0.6"/>
  <rect x="43" y="55" width="7" height="6" rx="1" fill="#1565C0" opacity="0.6"/>
  <rect x="53" y="55" width="7" height="6" rx="1" fill="#1565C0" opacity="0.6"/>

  <!-- Code brackets < /> overlaid -->
  <text x="50" y="95" font-family="monospace" font-size="11" font-weight="bold"
        fill="white" text-anchor="middle" opacity="0.9">&lt;/&gt;</text>

  <!-- Small checkmark badge (bottom-right) -->
  <circle cx="76" cy="76" r="13" fill="#00C853"/>
  <polyline points="70,76 74,81 83,70" stroke="white" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
